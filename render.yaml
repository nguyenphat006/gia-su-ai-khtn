# Render Blueprint — Gia sư AI KHTN Backend
# Docs: https://docs.render.com/blueprint-spec

services:
  - type: web
    name: giasu-ai-khtn-api
    runtime: node
    region: singapore  # Gần Việt Nam nhất

    # Build & Start
    rootDir: server
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm run start

    # Biến môi trường
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        fromDatabase:
          name: giasu-ai-khtn-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: ACCESS_TOKEN_TTL_MINUTES
        value: 15
      - key: REFRESH_TOKEN_TTL_DAYS
        value: 7
      - key: ACCESS_TOKEN_EXPIRES_IN
        value: 15m
      - key: REFRESH_TOKEN_EXPIRES_IN_DAYS
        value: 7
      - key: ALLOWED_ORIGINS
        sync: false  # Cần tự điền URL frontend khi deploy
      - key: GEMINI_API_KEY
        sync: false  # Cần tự điền API key

    # Auto deploy khi push lên branch main
    autoDeploy: true

databases:
  - name: giasu-ai-khtn-db
    plan: free
    region: singapore
    databaseName: ai_khtn_db
    user: ai_khtn_user
